name: Install Node.js dependencies
description: This composite action sets up a Node.js environment and installs dependencies using `npm ci`.
runs:
  using: composite
  steps:
    - name: Set up Node.js environment
      uses: actions/setup-node@v6
      with:
        check-latest: true
        node-version-file: package.json

    - name: Install dependencies
      run: npm ci
      shell: bash
